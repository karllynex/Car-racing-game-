<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill Climb PRO</title>

<style>
body{
  margin:0;
  background:#87CEEB;
  font-family:sans-serif;
  overflow:hidden;
}

canvas{
  display:block;
  margin:auto;
  background:linear-gradient(to top,#228B22,#87CEEB);
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  font-weight:bold;
}

#controls{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn{
  background:black;
  color:white;
  padding:15px;
  border-radius:10px;
  font-size:20px;
}

#shop{
  position:absolute;
  top:60px;
  left:10px;
  background:white;
  padding:10px;
  display:none;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="450"></canvas>

<div id="ui">
Score: <span id="score">0</span><br>
Fuel: <span id="fuel">100</span><br>
Coins: <span id="coins">0</span><br>
<button onclick="toggleShop()">Shop</button>
</div>

<div id="shop"></div>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="jump">▲</div>
<div class="btn" id="right">▶</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let keys={};
let scroll=0,velY=0,posX=150,posY=0;
let gravity=0.4,tilt=0;

let score=0,fuel=100,coins=0;

let vehicles=[
{speed:3,jump:6,color:"red",price:0},
{speed:4,jump:7,color:"blue",price:50},
{speed:5,jump:8,color:"green",price:100},
{speed:2,jump:5,color:"orange",price:30},
{speed:6,jump:9,color:"purple",price:150},
{speed:3,jump:6,color:"yellow",price:80},
{speed:5,jump:7,color:"pink",price:120},
{speed:4,jump:6,color:"cyan",price:90},
{speed:3,jump:5,color:"brown",price:60},
{speed:6,jump:8,color:"lime",price:200}
];

let unlocked=JSON.parse(localStorage.getItem("unlock"))||[true];
let current=0;

// SAVE SYSTEM
function save(){
  localStorage.setItem("coins",coins);
  localStorage.setItem("unlock",JSON.stringify(unlocked));
}
coins=parseInt(localStorage.getItem("coins"))||0;

// ROADS
let road={base:60,amp:40,freq:0.01};

function ground(x){
  return canvas.height-(road.base+Math.sin(x*road.freq)*road.amp);
}

// OBJECTS
let coinsArr=[],obstacles=[];
for(let i=400;i<6000;i+=300) coinsArr.push({x:i});
for(let i=600;i<6000;i+=400) obstacles.push({x:i});

// INPUT
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

// MOBILE
left.ontouchstart=()=>keys["ArrowLeft"]=true;
left.ontouchend=()=>keys["ArrowLeft"]=false;
right.ontouchstart=()=>keys["ArrowRight"]=true;
right.ontouchend=()=>keys["ArrowRight"]=false;
jump.ontouchstart=()=>keys["ArrowUp"]=true;
jump.ontouchend=()=>keys["ArrowUp"]=false;

// SHOP
function toggleShop(){
  let shop=document.getElementById("shop");
  shop.style.display=shop.style.display=="none"?"block":"none";
  renderShop();
}

function renderShop(){
  let shop=document.getElementById("shop");
  shop.innerHTML="";
  vehicles.forEach((v,i)=>{
    let btn=document.createElement("button");
    if(unlocked[i]){
      btn.innerText="Use "+i;
      btn.onclick=()=>current=i;
    }else{
      btn.innerText="Buy "+i+" ("+v.price+")";
      btn.onclick=()=>{
        if(coins>=v.price){
          coins-=v.price;
          unlocked[i]=true;
          save();
          renderShop();
        }
      }
    }
    shop.appendChild(btn);
    shop.appendChild(document.createElement("br"));
  });
}

// DRAW VEHICLE
function drawVehicle(v){
  ctx.save();
  ctx.translate(posX,posY);
  ctx.rotate(tilt);

  ctx.fillStyle=v.color;
  ctx.fillRect(-25,-15,50,15);

  ctx.fillStyle="white";
  ctx.fillRect(-10,-25,20,10);

  ctx.fillStyle="black";
  ctx.beginPath();
  ctx.arc(-15,5,8,0,Math.PI*2);
  ctx.arc(15,5,8,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// GAME LOOP
function game(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let v=vehicles[current];

  // PARALLAX
  ctx.fillStyle="#6db3f2";
  ctx.fillRect(0,0,canvas.width,200);

  let speed=0;
  if(keys["ArrowRight"] && fuel>0){
    scroll+=v.speed;
    fuel-=0.2;
    speed=v.speed;
  }

  velY+=gravity;
  posY+=velY;

  let g=ground(scroll+posX)-10;
  if(posY>g){posY=g;velY=0;}

  if(keys["ArrowUp"] && posY>=g){
    velY=-v.jump;
    fuel-=0.5;
  }

  tilt=velY*0.05;

  // ROAD
  ctx.beginPath();
  ctx.moveTo(0,canvas.height);
  for(let x=0;x<canvas.width;x++){
    ctx.lineTo(x,ground(scroll+x));
  }
  ctx.lineTo(canvas.width,canvas.height);
  ctx.fillStyle="#654321";
  ctx.fill();

  // COINS
  coinsArr.forEach(c=>{
    let x=c.x-scroll;
    let y=ground(c.x)-30;

    if(x>0 && x<canvas.width){
      ctx.fillStyle="gold";
      ctx.beginPath();
      ctx.arc(x,y,8,0,Math.PI*2);
      ctx.fill();

      if(Math.abs(posX-x)<20 && Math.abs(posY-y)<20){
        coins++;
        c.x+=10000;
        save();
      }
    }
  });

  // OBSTACLES
  obstacles.forEach(o=>{
    let x=o.x-scroll;
    let y=ground(o.x)-20;

    if(x>0 && x<canvas.width){
      ctx.fillStyle="black";
      ctx.fillRect(x,y,20,20);

      if(posX+20>x && posX<x+20 && posY+10>y){
        reset();
      }
    }
  });

  drawVehicle(v);

  score+=speed*0.1;

  scoreEl.innerText=Math.floor(score);
  fuelEl.innerText=Math.floor(fuel);
  coinsEl.innerText=coins;

  if(fuel<=0) reset();

  requestAnimationFrame(game);
}

// RESET
function reset(){
  alert("Game Over! Score: "+Math.floor(score));
  scroll=0;posY=0;velY=0;fuel=100;score=0;
}

// START
game();
</script>

</body>
  </html>
